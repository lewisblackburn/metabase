query GetSong($id: uuid!) {
    songs_by_pk(id: $id) {
        id
        name
        content_score
        created_at
        duration
        view_count
        vote_average
        vote_count
        album {
            artwork
            release_date
            artwork
            name
            id
        }
        song_availabilities {
            availability
        }
        song_genres {
            genre
        }
        song_keywords {
            keyword {
                keyword
            }
        }
    }
}
