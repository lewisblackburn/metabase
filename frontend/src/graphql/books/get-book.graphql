query GetBook($id: uuid!) {
    books_by_pk(id: $id) {
        id
        title
        overview
        cover
        content_score
        created_at
        language
        published_date
        reading_time
        view_count
        vote_average
        vote_count
        status
        googlebooks_id
        book_availabilities {
            availability
        }
        book_genres {
            genre
        }
        book_keywords {
            keyword {
                keyword
            }
        }
    }
}
