query GetProfile($id: uuid!) {
    user(id: $id) {
        id
        displayName
        email
        lastSeen
        createdAt
        avatarUrl
        emailVerified
        disabled
        locale
        followers_aggregate {
            aggregate {
                count
            }
        }
        followees_aggregate {
            aggregate {
                count
            }
        }
        is_following
    }
}
