query GetFollowers($user_id: uuid!, $followers_limit: Int, $followers_offset: Int) {
    user(id: $user_id) {
        followers(order_by: { created_at: desc }, limit: $followers_limit, offset: $followers_offset) {
            follower {
                id
                displayName
                email
                avatarUrl
                createdAt
            }
        }
        followers_aggregate {
            aggregate {
                count
            }
        }
    }
}
