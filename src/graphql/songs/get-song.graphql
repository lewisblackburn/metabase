query GetSong($id: uuid!) {
    songs_by_pk(id: $id) {
        id
        name
        duration
        content_score
        spotify_id
        apple_music_id
        album_id
        track_number
        explicit
        type
        spotify_uri
        disc_number
        album {
            id
            name
            artwork
            release_date
            type
        }
        credits {
            id
            person {
                name
            }
        }
    }
}
