query GetSongs(
    $distinct_on: [songs_select_column!]
    $limit: Int
    $offset: Int
    $order_by: [songs_order_by!]
    $where: songs_bool_exp
) {
    songs(distinct_on: $distinct_on, limit: $limit, offset: $offset, order_by: $order_by, where: $where) {
        id
        name
        album {
            artwork
        }
    }
}
