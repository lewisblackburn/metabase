subscription OnNotifications($user_id: uuid!) {
    notifications(where: { recipient_id: { _eq: $user_id } }, order_by: { created_at: desc }) {
        id
        actor {
            id
            displayName
        }
        user_activity {
            object_type
            object_title
            activity_type
            details
            created_at
        }
        is_read
        created_at
    }
}
