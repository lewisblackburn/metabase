query GetMovieForContentQualityCheck($id: uuid!) {
    movies_by_pk(id: $id) {
        id
        title
        overview
        backdrop
        budget
        content_score
        created_at
        imdb_id
        language
        poster
        release_date
        revenue
        runtime
        formatted_runtime
        tagline
        tmdb_id
        trailer
        view_count
        vote_average
        vote_count
        homepage
        credits {
            id
            credit_type
            details
            order
            person {
                id
                name
                headshot
            }
        }
        status
        certification
        movie_genres {
            genre {
                name
            }
        }
        movie_keywords {
            keyword {
                keyword
            }
        }
    }
}
