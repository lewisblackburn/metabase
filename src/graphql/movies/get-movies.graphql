query GetMovies(
    $distinct_on: [movies_select_column!]
    $limit: Int
    $offset: Int
    $order_by: [movies_order_by!]
    $where: movies_bool_exp
) {
    movies(distinct_on: $distinct_on, limit: $limit, offset: $offset, order_by: $order_by, where: $where) {
        id
        title
        poster
    }
}
