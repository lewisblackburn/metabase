query GetUserMovieStatus(
    $distinct_on: [user_movie_status_select_column!]
    $limit: Int
    $offset: Int
    $order_by: [user_movie_status_order_by!]
    $where: user_movie_status_bool_exp
) {
    user_movie_status(distinct_on: $distinct_on, limit: $limit, offset: $offset, order_by: $order_by, where: $where) {
        favourited
        rating
        review
        status
        updated_at
    }
}
