query GetMovie($id: uuid!) {
    movies_by_pk(id: $id) {
        id
        title
        overview
        average_rating
        backdrop
        budget
        content_score
        created_at
        imdb_id
        language
        poster
        release_date
        revenue
        runtime
        formatted_runtime
        tagline
        tmdb_id
        trailer
        updated_at
        view_count
        vote_average
        vote_count
        homepage
        user_movie_statuses {
            favourited
            rating
            review
            status
            updated_at
        }
        status {
            id
            name
        }
        certification {
            id
            name
        }
        movie_availabilities {
            availability {
                id
                name
            }
        }
        movie_genres {
            genre {
                name
            }
        }
        movie_keywords {
            keyword {
                keyword
            }
        }
        movie_soundtracks {
            id
            song {
                name
                song_artists {
                    id
                    person {
                        name
                    }
                }
            }
            timestamps
            description
        }
    }
}
