query GetMovie($id: uuid!) {
    movies_by_pk(id: $id) {
        id
        title
        overview
        age_rating
        average_rating
        backdrop
        budget
        content_score
        created_at
        imdb_id
        language
        poster
        release_date
        revenue
        runtime
        status
        tagline
        tmdb_id
        trailer
        updated_at
        view_count
        vote_average
        vote_count
        rated
        favourited
        watchlisted
        movie_genres {
            genre {
                name
            }
        }
        movie_keywords {
            keyword {
                keyword
            }
        }
        movie_cast_members {
            id
            role
            person {
                id
                name
                headshot
            }
        }
        movie_crew_members {
            id
            job
            department
            person {
                id
                name
                headshot
            }
        }
        movie_reviews {
            id
            rating
            review
            user {
                id
                displayName
                avatarUrl
            }
            created_at
        }
        movie_soundtracks {
            id
            song {
                title
                artwork
                song_artists {
                    id
                    person {
                        name
                    }
                }
            }
            timestamps
            description
        }
    }
}
