query GetAuditLogs(
    $distinct_on: [audit_logs_select_column!]
    $limit: Int
    $offset: Int
    $order_by: [audit_logs_order_by!]
    $where: audit_logs_bool_exp
) {
    audit_logs(distinct_on: $distinct_on, limit: $limit, offset: $offset, order_by: $order_by, where: $where) {
        id
        diff
        operation
        pk
        table_name
        user {
            avatarUrl
            displayName
        }
        created_at
    }
}
