query GetCredits(
    $distinct_on: [credits_select_column!]
    $limit: Int
    $offset: Int
    $order_by: [credits_order_by!]
    $where: credits_bool_exp
) {
    credits(distinct_on: $distinct_on, limit: $limit, offset: $offset, order_by: $order_by, where: $where) {
        id
        credit_type
        details
        order
        person {
            id
            name
            headshot
        }
    }
}
